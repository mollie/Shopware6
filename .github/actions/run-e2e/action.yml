name: 'Run E2E Tests'
description: "Runs installation and Cypress tests"


branding:
  icon: 'award'
  color: 'green'


inputs:
  # ------------------------------------------------------------------------------------
  # ENVIRONMENT SETTINGS
  SHOPWARE:
    description: "The Shopware version that is used to run the Cypress tests."
    required: true
  PHP:
    description: "The PHP Version that is used for the Shopware container."
    required: true
  IMAGE:
    description: "dockware image container."
    required: true
  MOLLIE_APIKEY_TEST:
    description: "The Mollie Test API key. Required for the installation."
    default: ''
    required: true
  # ------------------------------------------------------------------------------------
  # CYPRESS SETTINGS
  RUN_CYPRESS:
    description: "If disabled, only the plugin installation will be tested"
    default: 'true'
    required: false
  FILTERS:
    description: "An optional filter for the Cypress tests. Leave empty to run all tests"
    default: ''
    required: false
  REMOVE_DEPRECATED_TESTS:
    description: "If enabled, tests that are marked as deprecated will be removed"
    default: 'false'
    required: false
  CYPRESS_RESULTS_SUFFIX:
    description: "Additional suffix for the zip file with all Cypress results."
    default: ''
    required: false
  # ------------------------------------------------------------------------------------
  # PHP TEST SETTINGS
  PHPUNIT_GROUPS:
    description: "Optional PHPUnit group filter for the integration tests. Use 'core' to skip API-dependent tests when no Mollie API key is available (e.g. on pull requests)."
    default: ''
    required: false
  RUN_BEHAT:
    description: "If disabled, the Behat tests are skipped. They all require a Mollie API key, so disable them on pull requests."
    default: 'true'
    required: false
  # ------------------------------------------------------------------------------------
  # TESTRAIL SETTINGS
  TESTRAIL:
    description: "If enabled, all results will be sent to TestRail."
    default: 'false'
    required: false
  TESTRAIL_DOMAIN:
    description: "The domain for the TestRail endpoint"
    default: ''
    required: false
  TESTRAIL_USERNAME:
    description: "The username for the TestRail endpoint"
    default: ''
    required: false
  TESTRAIL_PASSWORD:
    description: "The password for the TestRail endpoint"
    default: ''
    required: false
  # ------------------------------------------------------------------------------------
  # ------------------------------------------------------------------------------------
  # PRIVATE VARIABLES
  _SHOP_DOMAIN:
    description: 'This domain will be used in Cypress as BASE_URL'
    default: 'cypress.github.shop'
    required: false
  _STORE_API_KEY:
    description: 'This is the Store API Key that is used when launching our Shopware. Its not confidential, its just for here'
    default: 'SWSCOVFSNKLBYUTKS1VSOEDGUQ'
    required: false
  _ZIP_FILE:
    description: 'This is the defined filename of the ZIP file that we use for the installation of the plugin'
    default: '~/.build/MolliePayments.zip'
    required: false



runs:
  using: "composite"
  steps:

    - name: Download Docker
      shell: bash
      run: docker pull -q ${{ inputs.IMAGE }}:${{ inputs.SHOPWARE }}

    - name: Start Docker
      shell: bash
      run: |
        docker run -p 443:443 --name shop --env PHP_VERSION=${{ inputs.PHP }} --env SHOPWARE_HTTP_CACHE_ENABLED=0 -d  ${{ inputs.IMAGE }}:${{ inputs.SHOPWARE }}
        sudo echo "127.0.0.1 ${{ inputs._SHOP_DOMAIN }}" | sudo tee -a /etc/hosts
        echo "Waiting for container to be ready..."
        timeout 420 sh -c 'until docker logs shop 2>&1 | grep -q "container IS READY"; do sleep 2; done' || { echo "::error::Container did not become ready in time"; docker logs shop; exit 1; }
        echo "Container is ready."
        docker exec shop bash -c "mysql -h 127.0.0.1 -u root -proot shopware -e \"UPDATE sales_channel_domain SET url='https://${{ inputs._SHOP_DOMAIN }}' WHERE url NOT LIKE 'default.%';\""
    - name: Fix Store API Key
      shell: bash
      run: |
        docker exec shop bash -c "mysql -h 127.0.0.1 -u root -proot shopware -e \"UPDATE sales_channel SET access_key='${{ inputs._STORE_API_KEY }}' WHERE id = (SELECT sales_channel_id FROM sales_channel_domain WHERE url = 'https://${{ inputs._SHOP_DOMAIN }}' LIMIT 1);\""
    - name: Disable Composer Platform Check
      shell: bash
      run: |
        # Some dockware images ship a composer.lock whose platform requirement is PHP >=8.3
        # while the container runs PHP 8.2, so vendor/composer/platform_check.php fatals on
        # every bin/console call. Disable the runtime check and regenerate the autoloader.
        docker exec shop bash -c 'composer config platform-check false'
        docker exec shop bash -c 'composer dump-autoload --no-scripts' || true
    - name: Disable Usage-Data Consent Banner
      shell: bash
      run: |
        # Sets the "Help us improve Shopware" consent so the banner does not overlay the
        # admin during Cypress. Nothing is transmitted since no message-queue worker runs
        # in the CI container.
        # <= 6.7.8 reads this system_config key.
        docker exec shop bash -c 'php bin/console --no-debug system:config:set core.usageData.consentState accepted' || true
        # >= 6.7.9.1 moved consent to the generic consent_state table.
        # The intrusive global MODAL ("Help us improve Shopware") is gated ONLY by the
        # 'product_analytics' consent, whose identifier is the admin user's id (hex) - NOT
        # the 'backend_data'/'system' row. The modal hides as soon as product_analytics has
        # any status != 'unset', so seed a 'declined' row for every admin user (declined
        # avoids enabling any tracking).
        docker exec shop bash -c "mysql -h 127.0.0.1 -u root -proot shopware -e \"INSERT INTO consent_state (id, name, identifier, state, actor, updated_at) SELECT UNHEX(REPLACE(UUID(),'-','')), 'product_analytics', LOWER(HEX(u.id)), 'declined', u.username, NOW(3) FROM \\\`user\\\` u ON DUPLICATE KEY UPDATE state=VALUES(state), updated_at=VALUES(updated_at);\"" || true
        # The Settings > Usage data page card is gated by the 'backend_data'/'system' row.
        docker exec shop bash -c "mysql -h 127.0.0.1 -u root -proot shopware -e \"INSERT INTO consent_state (id, name, identifier, state, actor, updated_at) VALUES (UNHEX(REPLACE(UUID(),'-','')), 'backend_data', 'system', 'accepted', 'migration', NOW(3)) ON DUPLICATE KEY UPDATE state='accepted', updated_at=NOW(3);\"" || true
    - name: Update Shopware Config
      shell: bash
      run: |
        # we have to enable cypress mode in our shop, this helps us to create subscriptions without webhooks
        docker exec shop bash -c "echo "MOLLIE_CYPRESS_MODE=1" >> /var/www/html/.env" || true;
        docker exec shop bash -c "echo "APP_URL=https://${{ inputs._SHOP_DOMAIN }}" >> /var/www/html/.env" || true;
        docker exec shop bash -c "echo "MOLLIE_PAYPAL_EXPRESS_BETA=1" >> /var/www/html/.env" || true;
        docker exec shop bash -c "echo "TEST_TOKEN='none'" >> /var/www/html/.env" || true;
        docker exec shop bash -c "echo "MAILER_DSN=null://null" >> /var/www/html/.env" || true;
        docker exec shop bash -c "echo "SHOPWARE_HTTP_CACHE_ENABLED=0" >> /var/www/html/.env" || true;
        docker exec shop bash -c "cp /var/www/html/.env /var/www/html/.env.local" || true;
        docker exec -u root bash shop -c "chown -R www-data:www-data /var/www/html" || true;

    # --------------------------------------------------------------------------------------------------------------------------------------

    - name: Upload ZIP File to Docker
      shell: bash
      run: |
        docker cp ${{ inputs._ZIP_FILE }} shop:/var/www/html/custom/plugins/MolliePayments.zip
        docker exec shop bash -c 'cd /var/www/html/custom/plugins && unzip -qq -o MolliePayments.zip'

    - name: Copy test files into Docker
      shell: bash
      run: |
        docker cp tests/ shop:/var/www/html/custom/plugins/MolliePayments/tests/
        docker cp config/ shop:/var/www/html/custom/plugins/MolliePayments/config/
        docker cp makefile shop:/var/www/html/custom/plugins/MolliePayments/makefile

    - name: Configure Shopware
      shell: bash
      run: |
        docker exec shop bash -c 'php bin/console --no-debug system:config:set core.loginRegistration.showAccountTypeSelection true' 
  

    - name: Prepare Shop for e2e tests
      shell: bash
      run: |
        docker exec shop bash -c 'composer config --no-plugins allow-plugins.wikimedia/composer-merge-plugin true'
        docker exec shop bash -c 'composer config --no-plugins allow-plugins.php-http/discovery true'
        docker exec shop bash -c 'composer config --json extra.merge-plugin "{\"include\":[\"custom/plugins/MolliePayments/composer.json\"], \"ignore-duplicates\":true}"'
        # Some dockware images lock packages to releases that require PHP >=8.3 while the
        # container runs PHP 8.2. Downgrade them to the newest PHP 8.2 compatible release
        # that still satisfies shopware/core, before merging the plugin's require-dev.
        # lcobucci/clock: 6.7.3.1 / 6.7.4.2 lock 3.4.0 (needs >=8.3); core only needs ^3.1.0.
        docker exec shop bash -c 'composer require --no-scripts -W --ignore-platform-reqs "lcobucci/clock:>=3.1 <3.4"'
        # phpunit: the merged require-dev (phpunit >=10) otherwise resolves to ^12 (needs >=8.3).
        docker exec shop bash -c 'composer require --dev --no-scripts -W --ignore-platform-reqs "phpunit/phpunit:^11.4"'
        docker exec shop bash -c 'composer require --ignore-platform-reqs wikimedia/composer-merge-plugin:*'

    - name: Install Plugin
      shell: bash
      run: |
        docker exec shop bash -c 'php bin/console --no-debug plugin:refresh'
        docker exec shop bash -c 'php bin/console --no-debug plugin:install MolliePayments --activate'
        docker exec shop bash -c 'php bin/console --no-debug cache:clear'

    - name: Configure Plugin
      if: ${{ inputs.MOLLIE_APIKEY_TEST != '' }}
      shell: bash
      run: |
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.testMode true'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.debugMode true'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.liveApiKey ${{ inputs.MOLLIE_APIKEY_TEST }}'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.testApiKey ${{ inputs.MOLLIE_APIKEY_TEST }}'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.formatOrderNumber github_{ordernumber}'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set core.mailerSettings.disableDelivery true'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set core.mailerSettings.emailAgent ""'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.subscriptionsEnabled true'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.subscriptionsAllowPauseResume true'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.subscriptionsAllowSkip true'
        docker exec shop bash -c 'php bin/console --no-debug system:config:set MolliePayments.config.subscriptionsAllowAddressEditing true'
        # clean settings inheritance
        docker exec shop bash -c "mysql -h 127.0.0.1 -u root -proot shopware -e \"DELETE FROM system_config WHERE sales_channel_id IS NOT NULL;\""
        docker exec shop bash -c 'php bin/console --no-debug cache:clear'

    - name: Compile Theme
      shell: bash
      run: |
        docker exec shop bash -c 'php bin/console --no-debug assets:install'
        docker exec shop bash -c 'php bin/console --no-debug theme:compile'
        docker exec shop bash -c 'php bin/console --no-debug cache:clear'

    - name: Install Fixtures
      shell: bash
      run: |
        docker exec shop bash -c 'php bin/console --no-debug mollie:fixtures:load'

    # --------------------------------------------------------------------------------------------------------------------------------------

    - name: DAL Validate
      shell: bash
      run: |
        docker exec shop bash -c 'php bin/console --no-debug dal:validate'

    # --------------------------------------------------------------------------------------------------------------------------------------
    - name: Integration analyzer
      shell: bash
      run: |
        docker exec shop bash -c 'cd custom/plugins/MolliePayments && make stan -B'

    - name: Integration tests
      shell: bash
      run: |
        docker exec shop bash -c 'cd custom/plugins/MolliePayments && make phpintegration groups="${{ inputs.PHPUNIT_GROUPS }}" -B'

    - name: Functional tests
      if: ${{ inputs.RUN_BEHAT == 'true' }}
      shell: bash
      run: |
        docker exec shop bash -c 'cd custom/plugins/MolliePayments && make behat -B'

    # The PHP integration/behat tests create sales channel contexts that get persisted here.
    # Clear them so the Cypress store-api logins start from a clean state and bind the customer
    # to a fresh context token instead of reusing a stale, customer-less one.
    - name: Clear stale sales channel contexts
      shell: bash
      run: |
        docker exec shop bash -c "mysql -h 127.0.0.1 -u root -proot shopware -e \"TRUNCATE sales_channel_api_context;\""

    - name: Install Cypress
      if: ${{ inputs.RUN_CYPRESS == 'true' }}
      shell: bash
      run: cd tests/Cypress && make install -B

    - name: Start Cypress
      if: ${{ inputs.RUN_CYPRESS == 'true' && inputs.TESTRAIL == 'false' }}
      shell: bash
      run: |
        cd tests/Cypress && \
        make run shopware=${{ inputs.SHOPWARE }} storeApiKey=${{ inputs._STORE_API_KEY }} url=https://${{ inputs._SHOP_DOMAIN }} filters="${{ inputs.FILTERS }}"

    - name: Start Cypress with TestRail
      if: ${{ inputs.RUN_CYPRESS == 'true' && inputs.TESTRAIL == 'true' }}
      shell: bash
      run: |
        cd tests/Cypress && \
        CYPRESS_TESTRAIL_DOMAIN=${{ inputs.TESTRAIL_DOMAIN }} \
        CYPRESS_TESTRAIL_USERNAME=${{ inputs.TESTRAIL_USERNAME }} \
        CYPRESS_TESTRAIL_PASSWORD=${{ inputs.TESTRAIL_PASSWORD }} \
        CYPRESS_TESTRAIL_PROJECT_ID=7 \
        CYPRESS_TESTRAIL_MILESTONE_ID=15 \
        CYPRESS_TESTRAIL_RUN_NAME="Github Workflow __datetime__, ${{ github.event.head_commit.message }}, Shopware ${{ inputs.SHOPWARE }}" \
        CYPRESS_TESTRAIL_RUN_CLOSE=true \
        make run shopware=${{ inputs.SHOPWARE }} storeApiKey=${{ inputs._STORE_API_KEY }} url=https://${{ inputs._SHOP_DOMAIN }} 

    # --------------------------------------------------------------------------------------------------------------------------------------

    - name: Download Logs
      if: ${{ inputs.RUN_CYPRESS == 'true' && always() }}
      shell: bash
      run: |
        mkdir -p $(pwd)/tests/Cypress/cypress/logs/shopware
        mkdir -p $(pwd)/tests/Cypress/cypress/logs/apache
        docker cp shop:/var/www/html/var/log/. $(pwd)/tests/Cypress/cypress/logs/shopware || true
        docker cp shop:/var/log/php/. $(pwd)/tests/Cypress/cypress/logs/apache || true

    - name: Store Cypress Results
      if: ${{ inputs.RUN_CYPRESS == 'true' && always() }}
      uses: actions/upload-artifact@v7
      with:
        name: cypress_results_v${{ inputs.SHOPWARE }}${{ inputs.CYPRESS_RESULTS_SUFFIX }}
        retention-days: 1
        path: |
          tests/Cypress/cypress/results
          tests/Cypress/cypress/logs
          tests/Cypress/cypress/videos
          tests/Cypress/cypress/screenshots