name: 'Build Plugin'
description: "Builds the Plugin"

runs:
  using: "composite"
  steps:

    - name: Build Plugin
      shell: bash
      working-directory: MolliePayments
      run: make release -B

    - name: Copy ZIP to build cache
      shell: bash
      run: cp .build/MolliePayments.zip ~/.build/MolliePayments.zip

    - name: Extract ZIP for artifact
      shell: bash
      run: unzip ~/.build/MolliePayments.zip -d ~/.build/MolliePayments

    - name: Store ZIP in Github
      uses: actions/upload-artifact@v4
      with:
        name: MolliePayments-Shopware
        include-hidden-files: true
        retention-days: 4
        path: ~/.build/MolliePayments

    - name: Delete TMP files
      shell: bash
      run: rm -rf ~/.build/MolliePayments
